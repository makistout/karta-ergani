<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/static/favicon.ico" sizes="any">
  <link rel="icon" href="/static/favicon-32.png" sizes="32x32" type="image/png">
  <link rel="icon" href="/static/favicon-16.png" sizes="16x16" type="image/png">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
  <title>erganiOS - Ψηφιακό ωράριο</title>
  <link rel="stylesheet" href="/static/css/office.css?v=20260617fix3">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="logo">
        <img src="/static/img/erganios-logo.png" alt="erganiOS" class="logo-img">
        <small>Ψηφιακή Κάρτα Εργασίας</small>
      </div>
      <nav>
        <a href="/ui/" data-nav="home">Αρχική</a>
        <a href="/ui/employees" data-nav="employees">Εργαζόμενοι</a>
        <a href="/ui/schedule" data-nav="schedule" class="active">Ψηφιακό ωράριο</a>
        <a href="/ui/work-log" data-nav="worklog">Πραγματική απασχόληση</a>
        <a href="/ui/missing-cards" data-nav="missingcards">Ελλειπή Χτυπήματα</a>
        <a href="/ui/work-card" data-nav="workcard">Ψηφιακή κάρτα</a>
        <a href="/ui/sync" data-nav="sync">Συγχρονισμός</a>
        <a href="/ui/stores" data-nav="stores">Καταστήματα</a>
        <a href="/ui/sync-log" data-nav="synclog">Καταγραφές</a>
      </nav>
    </aside>
    <main class="main">
      <h1 class="page-title"><i class="bi bi-calendar-week" aria-hidden="true"></i> Ψηφιακό ωράριο</h1>
      <p class="page-desc sync-meta-line" id="scheduleSyncMeta"></p>
      <div class="toolbar-dates card">
        <div class="toolbar-dates-row">
          <div id="scheduleDatePicker"></div>
          <button type="button" class="btn" id="btnSyncSchedule" disabled>
            <i class="bi bi-arrow-repeat" aria-hidden="true"></i><span>Συγχρονισμός Ergani</span>
          </button>
        </div>
      </div>
      <div class="card list-card">
        <div id="scheduleWrap" class="list-wrap"><p style="color:var(--muted);"><i class="bi bi-hourglass-split"></i> Φόρτωση…</p></div>
      </div>
      <div id="schedMsg" class="msg"></div>

      <div id="workLogHistoryModal" class="office-modal hidden" role="dialog" aria-modal="true" aria-labelledby="workLogHistoryTitle">
        <div class="office-modal-backdrop" data-history-close></div>
        <div class="office-modal-panel office-modal-panel--history">
          <h2 id="workLogHistoryTitle" class="office-modal-title">Πραγματική απασχόληση</h2>
          <p id="workLogHistoryEmployee" class="office-modal-sub"></p>
          <div id="workLogHistoryWrap" class="work-log-history-wrap">
            <p style="color:var(--muted);"><i class="bi bi-hourglass-split"></i> Φόρτωση…</p>
          </div>
          <div class="office-modal-actions">
            <button type="button" class="btn btn-secondary" data-history-close>Κλείσιμο</button>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="/static/js/office-common.js?v=20260617fix3"></script>
  <script src="/static/js/office-date-picker.js?v=20260611gr2"></script>
  <script src="/static/js/schedule-list.js?v=20260615perf"></script>
</body>
</html>
