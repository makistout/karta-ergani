<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/static/favicon.ico" sizes="any">
  <title>erganiOS - Σύνδεση</title>
  <link rel="stylesheet" href="/static/css/office.css?v=20260619login">
</head>
<body class="login-page">
  <div class="login-shell">
    <div class="login-card card">
      <div class="login-brand">
        <img src="/static/img/erganios-logo.png" alt="erganiOS" class="logo-img">
        <p class="login-subtitle">Ψηφιακή Κάρτα Εργασίας</p>
      </div>
      <h1 class="login-title"><i class="bi bi-shield-lock" aria-hidden="true"></i> Σύνδεση</h1>
      <p class="field-hint">Εισάγετε τα διαπιστευτήρια πρόσβασης στο γραφείο.</p>
      <label for="loginUser">Username</label>
      <input id="loginUser" type="text" autocomplete="username" autofocus>
      <label for="loginPass">Password</label>
      <input id="loginPass" type="password" autocomplete="current-password">
      <div class="actions" style="margin-top:1rem;">
        <button type="button" class="btn" id="btnLogin">
          <i class="bi bi-box-arrow-in-right" aria-hidden="true"></i><span>Είσοδος</span>
        </button>
      </div>
      <div id="loginMsg" class="msg"></div>
    </div>
  </div>
  <script src="/static/js/login.js?v=20260619login"></script>
</body>
</html>
