<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/static/favicon.ico" sizes="any">
  <title>erganiOS - Ενέργεια ειδοποίησης</title>
  <link rel="stylesheet" href="/static/css/office.css?v=20260620today2">
</head>
<body class="login-page">
  <main class="login-main today-action-main">
    <div class="card today-action-card">
      <h1 class="page-title today-action-title">
        <i class="bi bi-exclamation-triangle" aria-hidden="true"></i> Επιλογή ενέργειας
      </h1>
      <p id="todayActionIntro" class="page-desc">Φόρτωση…</p>
      <div id="todayActionDetails" class="today-action-details hidden"></div>

      <div id="todayActionChoices" class="today-action-choices hidden">
        <button type="button" class="btn btn-secondary today-action-choice" id="btnTodaySnooze">
          <i class="bi bi-bell-slash" aria-hidden="true"></i><span>Αναβολή — μην ειδοποιήσετε ξανά</span>
        </button>
        <button type="button" class="btn today-action-choice" id="btnTodayLeave">
          <i class="bi bi-calendar-x" aria-hidden="true"></i><span>Καταχώριση άδειας</span>
        </button>
        <button type="button" class="btn today-action-choice" id="btnTodayCard">
          <i class="bi bi-credit-card-2-front" aria-hidden="true"></i><span>Χτύπημα κάρτας</span>
        </button>
      </div>

      <div id="todayLeavePanel" class="today-leave-panel hidden">
        <h2 class="today-leave-title">Δήλωση άδειας</h2>
        <label class="field-label" for="todayLeaveType">Είδος άδειας</label>
        <select id="todayLeaveType" class="field-input"></select>
        <label class="field-label" for="todayLeaveComments">Παρατηρήσεις (προαιρετικά)</label>
        <textarea id="todayLeaveComments" class="field-input" rows="2" maxlength="200"></textarea>
        <div class="today-leave-actions">
          <button type="button" class="btn btn-secondary" id="btnTodayLeaveBack">Πίσω</button>
          <button type="button" class="btn" id="btnTodayLeaveSubmit">Υποβολή άδειας</button>
        </div>
      </div>

      <div id="todayActionMsg" class="msg"></div>
    </div>
  </main>
  <script src="/static/js/office-common.js?v=20260620today2"></script>
  <script src="/static/js/today-action.js?v=20260620today2"></script>
</body>
</html>
