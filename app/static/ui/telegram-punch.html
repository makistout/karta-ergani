<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/static/favicon.ico" sizes="any">
  <title>erganiOS - Αυτόματο χτύπημα κάρτας</title>
  <link rel="stylesheet" href="/static/css/office.css?v=20260619tgpin">
</head>
<body class="login-page">
  <main class="login-main" style="max-width:420px;margin:2rem auto;padding:1rem;">
    <div class="card" style="padding:1.25rem;">
      <h1 class="page-title" style="font-size:1.15rem;margin-bottom:0.5rem;">
        <i class="bi bi-credit-card-2-front" aria-hidden="true"></i> Αυτόματο χτύπημα κάρτας
      </h1>
      <p id="tgPunchIntro" class="page-desc" style="margin-top:0;">Φόρτωση…</p>
      <div id="tgPunchDetails" class="hidden" style="margin:1rem 0;font-size:0.95rem;line-height:1.5;"></div>
      <label class="field-label" for="tgPunchPin">Προσωπικός PIN λήπτη</label>
      <input type="text" id="tgPunchPin" class="field-input" inputmode="numeric" pattern="[0-9]{4}" maxlength="4" autocomplete="off" placeholder="1234" disabled>
      <p class="field-hint">4 αριθμητικά ψηφία — ορίζονται από το λογιστικό γραφείο στη φόρμα ληπτών Telegram.</p>
      <button type="button" id="btnTgPunchConfirm" class="btn" style="width:100%;margin-top:1rem;" disabled>
        <i class="bi bi-check2-circle" aria-hidden="true"></i><span>Ολοκλήρωση χτυπήματος</span>
      </button>
      <div id="tgPunchMsg" class="msg" style="margin-top:1rem;"></div>
    </div>
  </main>
  <script src="/static/js/office-common.js?v=20260619tgpin"></script>
  <script src="/static/js/telegram-punch.js?v=20260619tgpin"></script>
</body>
</html>
