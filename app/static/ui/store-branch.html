<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Κατάστημα — Παράρτημα</title>
  <link rel="stylesheet" href="/static/css/office.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="logo">Λογιστικό Γραφείο<small>Ψηφιακή Κάρτα Εργασίας</small></div>
      <nav>
        <a href="/ui/" data-nav="home">Αρχική</a>
        <a href="/ui/stores" data-nav="stores">Καταστήματα</a>
        <a href="/ui/employees" data-nav="employees">Εργαζόμενοι</a>
        <a href="/ui/schedule" data-nav="schedule">Ψηφιακό ωράριο</a>
        <a href="/ui/work-log" data-nav="worklog">Πραγματική απασχόληση</a>
        <a href="/ui/work-card" data-nav="workcard">Ψηφιακή κάρτα</a>
        <a href="/ui/sync-log" data-nav="synclog">Καταγραφή</a>
      </nav>
    </aside>
    <main class="main">
      <h1 class="page-title"><i class="bi bi-diagram-3" aria-hidden="true"></i> Επιλογή παραρτήματος</h1>
      <p class="page-desc">Βήμα 2 από 3 — EX_BASE_02 (παραρτήματα εργοδότη).</p>
      <div class="steps">
        <span class="step done"><i class="bi bi-check-circle-fill"></i> Διαπιστευτήρια</span>
        <span class="step active"><i class="bi bi-2-circle-fill"></i> Παράρτημα</span>
        <span class="step"><i class="bi bi-3-circle"></i> Κατάλογοι</span>
      </div>
      <div class="card">
        <p id="employerHint" style="font-size:0.88rem;color:var(--muted);margin-bottom:1rem;"></p>
        <label for="branchSelect">Παράρτημα (ΑΑ)</label>
        <select id="branchSelect"></select>
        <div class="actions">
          <a class="btn btn-secondary" href="/ui/stores/credentials"><i class="bi bi-arrow-left-circle" aria-hidden="true"></i><span>Πίσω</span></a>
          <button type="button" class="btn" id="btnStep2Next"><i class="bi bi-arrow-right-circle" aria-hidden="true"></i><span>Συνέχεια</span></button>
        </div>
      </div>
      <div id="stepMsg" class="msg"></div>
    </main>
  </div>
  <script src="/static/js/office-common.js"></script>
  <script src="/static/js/store-branch.js"></script>
</body>
</html>
