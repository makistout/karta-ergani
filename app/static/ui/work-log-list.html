<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Πραγματική απασχόληση</title>
  <link rel="stylesheet" href="/static/css/office.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="logo">Λογιστικό Γραφείο<small>Ψηφιακή Κάρτα Εργασίας</small></div>
      <nav>
        <a href="/ui/" data-nav="home">Αρχική</a>
        <a href="/ui/stores" data-nav="stores">Καταστήματα</a>
        <a href="/ui/employees" data-nav="employees">Εργαζόμενοι</a>
        <a href="/ui/schedule" data-nav="schedule">Ψηφιακό ωράριο</a>
        <a href="/ui/work-log" data-nav="worklog" class="active">Πραγματική απασχόληση</a>
        <a href="/ui/work-card" data-nav="workcard">Ψηφιακή κάρτα</a>
      </nav>
    </aside>
    <main class="main">
      <h1 class="page-title"><i class="bi bi-clock-history" aria-hidden="true"></i> Πραγματική απασχόληση</h1>
      <p class="page-desc">Parse portal Ergani — <strong>eservices.yeka.gr</strong> (παραγωγή) ή <strong>trialv2eservices.yeka.gr</strong> (δοκιμαστικό), σύμφωνα με το περιβάλλον του ενεργού καταστήματος.</p>
      <div class="toolbar-dates card">
        <div class="toolbar-dates-row">
          <div id="workLogDatePicker"></div>
          <button type="button" class="btn" id="btnSyncWorkLog" disabled>
            <i class="bi bi-arrow-repeat" aria-hidden="true"></i><span>Συγχρονισμός Ergani</span>
          </button>
        </div>
      </div>
      <div class="card">
        <div id="workLogWrap"><p style="color:var(--muted);"><i class="bi bi-hourglass-split"></i> Φόρτωση…</p></div>
      </div>
      <div id="workLogMsg" class="msg"></div>
    </main>
  </div>
  <script src="/static/js/office-common.js"></script>
  <script src="/static/js/office-date-picker.js"></script>
  <script src="/static/js/work-log-list.js"></script>
</body>
</html>
