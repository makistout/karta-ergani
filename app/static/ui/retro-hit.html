<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/static/favicon.ico" sizes="any">
  <title>erganiOS - Προγενέστερη καταχώρηση</title>
  <link rel="stylesheet" href="/static/css/office.css?v=20260619retrohit1">
</head>
<body class="login-page retro-hit-page">
  <main class="login-main retro-hit-main">
    <div class="card retro-hit-card">
      <h1 class="page-title retro-hit-page-title">
        <i class="bi bi-clock-history" aria-hidden="true"></i> Προγενέστερη καταχώρηση
      </h1>
      <p id="rhIntro" class="page-desc">Φόρτωση…</p>
      <div id="rhEmployee" class="retro-hit-employee hidden"></div>

      <section class="work-card-retro work-card-retro--required" aria-labelledby="rhRetroTitle">
        <h2 class="work-card-retro-title" id="rhRetroTitle">
          <i class="bi bi-clock-history" aria-hidden="true"></i>
          Στοιχεία χτυπήματος
        </h2>
        <p class="work-card-retro-desc">
          Αιτιολογία εκπρόθεσμης Ergani:
          <strong>001 — ΠΡΟΒΛΗΜΑ ΣΤΗΝ ΗΛΕΚΤΡΟΔΟΤΗΣΗ/ΤΗΛΕΠΙΚΟΙΝΩΝΙΕΣ</strong>
        </p>
        <div class="form-row">
          <label for="rhRetroDate">Ημερομηνία κτυπήματος</label>
          <input type="text" id="rhRetroDate" placeholder="ηη/μμ/εεεε" disabled>
        </div>
        <div class="form-row">
          <label for="rhRetroTime">Ώρα κτυπήματος</label>
          <input type="text" id="rhRetroTime" class="input-time-24" inputmode="numeric"
            placeholder="10:30" maxlength="5" autocomplete="off" disabled>
        </div>
        <div class="work-card-actions work-card-actions-retro">
          <button type="button" class="btn btn-secondary" id="btnRhCheckIn" disabled>
            <i class="bi bi-box-arrow-in-right" aria-hidden="true"></i><span>Είσοδος</span>
          </button>
          <button type="button" class="btn btn-secondary" id="btnRhCheckOut" disabled>
            <i class="bi bi-box-arrow-right" aria-hidden="true"></i><span>Έξοδος</span>
          </button>
        </div>
      </section>
      <div id="rhMsg" class="msg" style="margin-top:1rem;"></div>
    </div>
  </main>
  <script src="/static/js/office-common.js?v=20260619clientaudit1"></script>
  <script src="/static/js/office-date-picker.js?v=20260611gr2"></script>
  <script src="/static/js/retro-hit.js?v=20260622cardsync1"></script>
</body>
</html>
