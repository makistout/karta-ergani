<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/static/favicon.ico" sizes="any">
  <link rel="icon" href="/static/favicon-32.png" sizes="32x32" type="image/png">
  <link rel="icon" href="/static/favicon-16.png" sizes="16x16" type="image/png">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
  <title>{{ page_title }}</title>
  <link rel="stylesheet" href="/static/css/office.css?v=20260629rolematrix2">
  {% block extra_head %}{% endblock %}
</head>
<body{% if body_class %} class="{{ body_class }}"{% endif %}>
  {% if shell == "office" %}
  <div class="layout">
    {% include "ui/partials/_sidebar.html" %}
    <main class="main">
      {% block content %}{% endblock %}
    </main>
  </div>
  {% else %}
  {% block public_content %}{% endblock %}
  {% endif %}
  <script src="/static/js/office-common.js?v=20260624split2"></script>
  <script src="/static/js/office-chrome.js?v=20260629adminmenu1"></script>
  <script src="/static/js/office-store.js?v=20260624split2"></script>
  <script src="/static/js/office-feedback.js?v=20260624split2"></script>
  <script src="/static/js/office-table.js?v=20260624split2"></script>
  <script src="/static/js/office-sync.js?v=20260624split2"></script>
  <script src="/static/js/office-format.js?v=20260624split2"></script>
  <script src="/static/js/office-store-sync.js?v=20260624split2"></script>
  <script src="/static/js/office-work-log.js?v=20260626closeall10"></script>
  <script src="/static/js/office-auth.js?v=20260624split2"></script>
  <script src="/static/js/office-boot.js?v=20260624split2"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
