<aside class="sidebar">
  <div class="logo">
    <img src="/static/img/erganios-logo.png" alt="erganiOS" class="logo-img">
    <small>Ψηφιακή Κάρτα Εργασίας</small>
  </div>
  <button type="button" class="sidebar-menu-toggle" aria-expanded="false" aria-controls="officeSidebarNav" aria-label="Άνοιγμα μενού">
    <span></span>
    <span></span>
    <span></span>
  </button>
  <nav id="officeSidebarNav">
    {% for item in office_nav_items %}
      {% if office_nav_item_allowed(item) %}
        <a href="{{ item.href }}" data-nav="{{ item.nav }}" class="{{ 'active' if active_nav == item.nav else '' }}">{{ item.label }}</a>
      {% endif %}
    {% endfor %}
  </nav>
</aside>
